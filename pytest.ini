[pytest]
pythonpath = src
testpaths = tests
asyncio_default_fixture_loop_scope = function
markers = 
    asyncio: mark a test as an asyncio test.
    e2e: marks tests as end-to-end tests (requires full environment)
filterwarnings =
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::pydantic.PydanticDeprecatedSince20:.*json_encoders.*
log_cli = true
log_cli_level = INFO
addopts = -s
asyncio_mode = auto
log_level = WARNING

