global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rabbitmq'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rabbitmq1:15692', 'rabbitmq2:15693', 'rabbitmq3:15694']
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
