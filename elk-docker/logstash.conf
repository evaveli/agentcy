input {
  file {
    # Use mode => "tail" to continuously read new data.
    mode => "tail"
    path => "/usr/share/logstash/ingest_data/*"
  }
}

filter {
  # Add any filters you need here.
}

output {
  elasticsearch {
    index => "logstash-%{+YYYY.MM.dd}"
    hosts=> "${ELASTIC_HOSTS}"
    user=> "${ELASTIC_USER}"
    password=> "${ELASTIC_PASSWORD}"
    cacert=> "certs/ca/ca.crt"
  }
}
