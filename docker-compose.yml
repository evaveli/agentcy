      - LLM_STRATEGIST_ENABLE=${LLM_STRATEGIST_ENABLE:-1}
      - LLM_STRATEGIST_PROVIDER=${LLM_STRATEGIST_PROVIDER:-}
      - AGENT_REGISTRY_URL=http://api_service:8080
      - AGENT_REGISTRY_USERNAME=${AGENT_REGISTRY_USERNAME:-default}
      - AGENT_CAPABILITIES=llm_strategist,execution_strategy
      - AGENT_TAGS=coordination,strategy
      - AGENT_DESCRIPTION=LLM Strategist Agent
      - SERVICE_NAME=llm_strategist
      - PIPELINE_EVENTS_QUEUE=pipeline_events_llm_strategist
      - AGENT_REGISTRY_TTL_SECONDS=0
      - LOG_LEVEL=INFO
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_INSECURE=true
