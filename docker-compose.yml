  ethics-checker-agent:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.runtime
    container_name: ethics-checker-agent
    depends_on:
      rabbitmq: { condition: service_healthy }
      couchbase: { condition: service_healthy }
      couchbase-setup: { condition: service_completed_successfully }
    command: ["/opt/venv/bin/python", "-m", "agentcy.agent_runtime.cli",
             "--service-name", "ethics_checker",
             "--entry", "agentcy.agent_runtime.services.ethics_checker:run"]
    environment:
      - AMQP_URI=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPEN_AI_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CB_CONN_STR=couchbase://couchbase
      - CB_USER=${CB_USER}
      - CB_PASS=${CB_PASS}
      - CB_BUCKET=${CB_BUCKET}
      - CB_BUCKET_EPHEMERAL=${CB_BUCKET_EPHEMERAL}
      - CB_SCOPE=${CB_SCOPE}
      - AGENT_RUNTIME_CB=1
      - AGENT_RUNTIME_EPHEMERAL_CB=1
      - PIPELINE_RUN_SUFFIX=${PIPELINE_RUN_SUFFIX:-1}
      - ETHICS_CHECK_ENABLE=${ETHICS_CHECK_ENABLE:-1}
      - EXECUTION_REQUIRE_ETHICS=${EXECUTION_REQUIRE_ETHICS:-1}
      - LLM_STUB_MODE=${LLM_STUB_MODE:-0}
      - LLM_ETHICS_PROVIDER=${LLM_ETHICS_PROVIDER:-}
      - AGENT_REGISTRY_URL=http://api_service:8080
      - AGENT_REGISTRY_USERNAME=${AGENT_REGISTRY_USERNAME:-default}
      - AGENT_CAPABILITIES=ethics_checker,policy_enforcement
      - AGENT_TAGS=coordination,ethics
      - AGENT_DESCRIPTION=Ethics Checker Agent
      - SERVICE_NAME=ethics_checker
      - PIPELINE_EVENTS_QUEUE=pipeline_events_ethics_checker
      - AGENT_REGISTRY_TTL_SECONDS=0
      - LOG_LEVEL=INFO
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_INSECURE=true
    networks: [agentcy]

  email-drafting-agent:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.runtime
    container_name: email-drafting-agent
    depends_on:
      rabbitmq: { condition: service_healthy }
      couchbase: { condition: service_healthy }
      couchbase-setup: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
    command: ["/opt/venv/bin/python", "-m", "agentcy.agent_runtime.cli",
             "--service-name", "email-drafting",
             "--entry", "agentcy.demo_agents.email_agent:run"]
    environment:
      - AMQP_URI=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://${PG_USER:-agentcy}:${PG_PASS:-agentcy}@postgres:5432/${PG_DB:-agentcy}
      - CB_CONN_STR=couchbase://couchbase
      - CB_USER=${CB_USER}
      - CB_PASS=${CB_PASS}
      - CB_BUCKET=${CB_BUCKET}
      - CB_BUCKET_EPHEMERAL=${CB_BUCKET_EPHEMERAL}
      - CB_SCOPE=${CB_SCOPE}
      - AGENT_RUNTIME_CB=1
      - AGENT_RUNTIME_EPHEMERAL_CB=1
      - PIPELINE_RUN_SUFFIX=${PIPELINE_RUN_SUFFIX:-1}
      - CNP_MANAGER_ENABLE=${CNP_MANAGER_ENABLE:-1}
      - AGENT_REGISTRY_URL=http://api_service:8080
      - AGENT_REGISTRY_USERNAME=${AGENT_REGISTRY_USERNAME:-default}
      - AGENT_CAPABILITIES=email_drafting,client_communication,follow_up
      - AGENT_TAGS=business
      - AGENT_DESCRIPTION=Email / Communication Drafting Agent
      - SERVICE_NAME=email-drafting
      - PIPELINE_EVENTS_QUEUE=pipeline_events_email_drafting
      - AGENT_REGISTRY_TTL_SECONDS=0
      - LOG_LEVEL=INFO
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_INSECURE=true
    networks: [agentcy]

  # ─────────── Frontend ───────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3001:80"
    depends_on:
      - api_service
    networks: [agentcy]

  # ─────────── Observability stack ───────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape
    networks: [agentcy]

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tempo
    ports:
      - "3200:3200"
    networks: [agentcy]

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: ["-config.file=/etc/loki.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [agentcy]

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    command: ["-config.file=/etc/promtail.yml"]
    volumes:
      - ./observability/promtail.yml:/etc/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks: [agentcy]

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [agentcy]

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks: [agentcy]
