# Fluentd Production-Grade Configuration
# TLS is disabled here because TLS termination is handled by Kubernetes.

<source>
  @type tail
  # The file path where your application logs are stored.
  path /var/log/myapp.log
  # Position file tracks the last-read position in the log file.
  # This prevents duplicate processing after restarts.
  pos_file /var/log/fluentd/myapp.log.pos
  # Tag assigned to each log entry for routing purposes.
  tag myapp.logs
  # 'none' indicates raw log input. Replace with a parser (e.g., json) if needed.
  format none
  # Uncomment below if your logs span multiple lines (e.g., stack traces).
  # multiline_flush_interval 5s
</source>

<match myapp.logs>
  @type forward
  # Specify one or more destination servers for log forwarding.
  <server>
    host data-prepper.production.internal
    port 5001
  </server>
  
  # Buffering configuration ensures logs are not lost during network issues.
  # Logs are stored temporarily on disk until successfully forwarded.
  buffer_path /var/log/fluentd/buffer
  
  # Set maximum chunk size for each buffered block to manage memory usage.
  chunk_limit_size 8MB
  
  # Limit the number of chunks in the buffer queue to avoid disk overflow.
  queue_limit_length 64
  
  # Flush interval defines how often the buffered logs are sent to the server.
  flush_interval 5s
  
  # Ensure that any pending logs are flushed on shutdown to prevent data loss.
  flush_at_shutdown true
  
  # Retry configuration for handling transient network or server issues.
  # retry_limit specifies how many retry attempts will be made.
  retry_limit 17
  
  # Time to wait between retries; helps accommodate temporary network issues.
  retry_wait 1s
  
  # Maximum interval between retries; prevents excessively long wait times.
  retry_max_interval 60s
  
  # Optionally, adjust the plugin's internal logging level for troubleshooting.
  # log_level warn
</match>
